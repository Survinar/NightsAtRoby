<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5 Nights at Roby Bar</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="manifest" href="./site.webmanifest">

    <!-- iOS Safari Standalone Mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Roby Bar">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            /* Safari unique selection disable */
            -webkit-touch-callout: none;
            /* Disable Safari long-press menu */
            background: black;
            touch-action: none;
            /* Forcefully disable browser zoom/pan/scroll */
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #health {
            color: #ff4444;
        }

        #score {
            color: #44ff44;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 0, 0.8);
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            text-align: center;
            line-height: 20px;
            font-weight: bold;
        }

        #blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 200;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 48px;
        }

        p {
            font-size: 20px;
            color: #ccc;
        }

        #nukeFlash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 150;
            transition: opacity 0.1s;
        }

        #nukeStatus {
            color: #ffaa00;
        }

        #minimap-border {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%; /* Made circular by default */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
            overflow: hidden; /* Key for circular clipping */
            background: rgba(0, 0, 0, 0.3); /* Subtle backdrop */
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        #bossBarContainer {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            display: none;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        #bossBarFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #880000, #ff0000);
            transition: width 0.2s ease-out;
        }

        #bossBarTitle {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-family: 'Arial Black', sans-serif;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px black;
            width: 100%;
            text-align: center;
        }

        #ammoUI {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 22px;
            text-align: right;
            text-shadow: 2px 2px 4px black;
            z-index: 100;
        }

        #announcement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-family: 'Arial Black', sans-serif;
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 0, 0, 1), 0 0 30px rgba(255, 0, 0, 0.8);
            display: none;
            z-index: 200;
            pointer-events: none;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 10px;
        }

        #powerupUI {
            position: absolute;
            bottom: 60px;
            left: 20px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }

        #doubleDamageStatus {
            color: #ffaa00;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-left: 5px solid #ffaa00;
            border-radius: 2px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        /* Mobile Controls */
        #mobileControls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 150;
        }

        #joystickBase {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
        }

        #joystickStick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .mobile-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            white-space: pre-line; /* Support \n newlines */
            line-height: 1.1;
            padding: 5px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 13px;
            pointer-events: auto;
            text-transform: uppercase;
        }

        #btnShoot {
            bottom: 60px;
            right: 50px;
            width: 100px;
            height: 100px;
            background: rgba(255, 50, 50, 0.3);
            border-color: rgba(255, 50, 50, 0.6);
        }

        #btnJump {
            bottom: 180px;
            right: 60px;
        }

        #btnReload {
            bottom: 180px;
            right: 160px;
        }

        #btnNuke {
            bottom: 60px;
            right: 170px;
            background: rgba(255, 170, 0, 0.3);
            border-color: rgba(255, 170, 0, 0.6);
        }

        #orientationOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        @media (orientation: portrait) {
            #orientationOverlay {
                display: flex;
            }
        }

        /* Mobile Scale Adjustments */
        @media screen and (max-width: 900px) {
            #ui h2 {
                font-size: 16px;
            }

            #nukeStatus {
                display: none;
                /* Already integrated into button */
            }

            #ammoUI h2 {
                font-size: 18px;
            }

            #bossBarContainer {
                width: 300px;
                top: 20px;
            }

            #minimap-border {
                width: 110px;
                height: 110px;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.3);
                border-width: 2px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="nukeFlash"></div>
    <div id="ui">
        <h2 id="health">Health: <span id="healthValue">100</span></h2>
        <h2 id="score">Score: <span id="scoreValue">0</span></h2>
        <h2 id="nukeStatus">☢ NUKE [N] - READY</h2>
    </div>
    <div id="ammoUI">
        <h2 id="ammo">AMMO: <span id="ammoValue">15</span> / 15</h2>
    </div>
    <div id="minimap-border">
        <canvas id="minimapCanvas"></canvas>
    </div>
    <div id="bossBarContainer">
        <div id="bossBarTitle">CARMEN</div>
        <div id="bossBarFill"></div>
    </div>
    <div id="powerupUI">
        <div id="doubleDamageStatus">🚬 x2 DAMAGE: 5.0s</div>
    </div>
    <div id="announcement"></div>
    <div id="crosshair">+</div>

    <div id="blocker">
        <h1>5 NIGHTS AT ROBY BAR</h1>
        <p id="startInstructions">Click anywhere to start</p>
    </div>

    <div id="mobileControls">
        <div id="joystickBase">
            <div id="joystickStick"></div>
        </div>
        <div id="btnShoot" class="mobile-btn">Shoot</div>
        <div id="btnJump" class="mobile-btn">Jump</div>
        <div id="btnReload" class="mobile-btn">Reload</div>
        <div id="btnNuke" class="mobile-btn">Nuke</div>
    </div>

    <div id="orientationOverlay">
        <h2>🔄 Landscape Mode Required</h2>
        <p>Please rotate your device to play!</p>
        <p id="safariTip" style="font-size: 14px; margin-top: 20px; color: #ffaa00; display: none;">
            Safari Tip: Use <b>Add to Home Screen</b> to hide browser bars!
        </p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // VARs
        let health = 100;
        let score = 0;
        let godMode = false;
        let bossSpawned = false;
        const bullets = [];
        const targets = [];
        const medkits = [];
        const treePositions = [];
        const bushPositions = [];
        let lastTime = performance.now();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isSprinting = false, isCrouching = false, isJumping = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let velocityY = 0;
        let canJump = true;
        const GRAVITY = 30;
        const JUMP_FORCE = 12;
        let nukeReady = true;
        let nukeCooldown = 0;
        let nukeActive = false;
        let nukeSphere = null;
        let nukeTimer = 0;
        const NUKE_COOLDOWN = 1; // secs
        const cigarettes = [];
        let doubleDamageTimer = 0;
        let damageMultiplier = 1;

        const nukeFlash = document.getElementById('nukeFlash');
        const nukeStatusEl = document.getElementById('nukeStatus');
        const bossBarContainer = document.getElementById('bossBarContainer');
        const bossBarFill = document.getElementById('bossBarFill');
        const powerupUI = document.getElementById('powerupUI');
        const doubleDamageStatus = document.getElementById('doubleDamageStatus');
        const announcementEl = document.getElementById('announcement');
        const BOSS_MAX_HP = 150;
        let recoilAmount = 0;
        let recoilRotation = 0;

        // Mobile Logic
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0);
        let touchLookId = null;
        let touchMoveId = null;
        let lastTouchLook = { x: 0, y: 0 };
        let joystickStart = { x: 0, y: 0 };
        let joystickVector = { x: 0, y: 0 };
        const mobileControls = document.getElementById('mobileControls');
        const joystickStick = document.getElementById('joystickStick');
        const startInstructions = document.getElementById('startInstructions');

        if (isMobile) {
            mobileControls.style.display = 'block';
            startInstructions.innerText = 'Tap to enter Fullscreen and Start';

            // Safari Standalone check
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            if (isIOS && !isStandalone) {
                document.getElementById('safariTip').style.display = 'block';
            }
        }

        // Audio System
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playShootSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playReloadSound() {
            if (!audioCtx) return;
            // Two mechanical clicks
            [0, 0.2].forEach(delay => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + delay);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + delay + 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + delay);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + delay);
                osc.stop(audioCtx.currentTime + delay + 0.05);
            });
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playPickupSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // White noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 2);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // Ammo / Reloading
        let ammo = 15;
        const maxAmmo = 15;
        let isReloading = false;
        let reloadProgress = 0; // 0 to 1
        const ammoValueEl = document.getElementById('ammoValue');

        // texture loader
        const textureLoader = new THREE.TextureLoader();
        const zombieFaceTexture1 = textureLoader.load('./zombie_face_1.png');
        const zombieFaceTexture2 = textureLoader.load('./zombie_face_2.png');
        const zombieFaceTexture3 = textureLoader.load('./zombie_face_3.png');
        const zombieFaceTexture4 = textureLoader.load('./zombie_face_4.png');
        const posterTexture = textureLoader.load('./poster.png');
        const bossFaceTexture = textureLoader.load('./boss_face.png');
        const bossTorsoTexture = textureLoader.load('./boss_torso.png');
        const bossLegsTexture = textureLoader.load('./boss_legs.png');
        const bossHandsTexture = textureLoader.load('./boss_hands.png');

        // scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6688aa);
        scene.fog = new THREE.Fog(0x6688aa, 20, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; // Essential for FPS-style controls to prevent sideways tilt
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        // dedicated minimap renderer
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapRenderer = new THREE.WebGLRenderer({ 
            canvas: minimapCanvas, 
            antialias: true,
            alpha: true 
        });
        const mmSize = isMobile ? 110 : 200;
        minimapRenderer.setSize(mmSize, mmSize);

        // minimap 
        const MINIMAP_LAYER = 1;
        const mapSize = 200;
        const mapCamera = new THREE.OrthographicCamera(-80, 80, 80, -80, 1, 1000);
        mapCamera.position.y = 200;
        mapCamera.lookAt(0, 0, 0);
        mapCamera.layers.enable(MINIMAP_LAYER); // layering

        const playerDotGeo = new THREE.ConeGeometry(5, 12, 3);
        playerDotGeo.rotateX(Math.PI / 2); // neg z
        const playerDotMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const playerDot = new THREE.Mesh(playerDotGeo, playerDotMat);
        playerDot.layers.set(MINIMAP_LAYER); 
        scene.add(playerDot);

        // main controls
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isMobile) {
                // Fullscreen request
                const doc = window.document;
                const docEl = doc.documentElement;
                const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
                if (requestFullScreen) requestFullScreen.call(docEl);

                blocker.style.display = 'none';
                controls.isLocked = true; // Manual lock for mobile logic
            } else {
                controls.lock();
            }
        });
        controls.addEventListener('lock', () => {
            if (!isMobile) blocker.style.display = 'none';
        });
        controls.addEventListener('unlock', () => {
            if (!isMobile) blocker.style.display = 'flex';
        });
        scene.add(controls.getObject());

        // lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        // envr
        const floorGeo = new THREE.PlaneGeometry(200, 200, 10, 10);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x1a2e12, side: THREE.DoubleSide });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(200, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // mountain
        const platformMeshes = [];
        const platformBoxes = [];

        function createMountain(x, z, levels) {
            const mtrl = new THREE.MeshPhongMaterial({ color: 0x4a4a5a }); // gray rock
            for (let i = 0; i < levels; i++) {
                const size = (levels - i) * 6;
                const h = 2; // step height
                const boxGeo = new THREE.BoxGeometry(size, h, size);
                const box = new THREE.Mesh(boxGeo, mtrl);
                box.position.set(x, i * h + (h / 2), z);
                scene.add(box);
                platformMeshes.push(box);

                box.updateMatrixWorld();
                const box3 = new THREE.Box3().setFromObject(box);
                platformBoxes.push(box3);
            }
        }

        // mountains around the scene
        createMountain(-40, -40, 4);
        createMountain(40, -50, 3);
        createMountain(-50, 40, 5);
        createMountain(50, 50, 4);

        // Map Borders (Transparent Walls)
        const wallMatInvisible = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
        function createBorderWall(width, height, depth, x, y, z) {
            const wallGeo = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(wallGeo, wallMatInvisible);
            wall.position.set(x, y, z);
            scene.add(wall);

            wall.updateMatrixWorld();
            const box3 = new THREE.Box3().setFromObject(wall);
            platformBoxes.push(box3);
        }

        // 200x200 map, so edges are at +/- 100
        createBorderWall(204, 20, 2, 0, 10, -101); // North
        createBorderWall(204, 20, 2, 0, 10, 101);  // South
        createBorderWall(2, 20, 204, -101, 10, 0); // West
        createBorderWall(2, 20, 204, 101, 10, 0);  // East

        // trees and bushes
        const treeGeoTrunk = new THREE.CylinderGeometry(0.5, 0.5, 3, 8);
        const treeMatTrunk = new THREE.MeshPhongMaterial({ color: 0x4a2e15 });
        const treeGeoLeaves = new THREE.ConeGeometry(2.5, 5, 8);
        const treeMatLeaves = new THREE.MeshPhongMaterial({ color: 0x2d4c1e });

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(treeGeoTrunk, treeMatTrunk);
            trunk.position.y = 1.5;
            tree.add(trunk);

            const leaves = new THREE.Mesh(treeGeoLeaves, treeMatLeaves);
            leaves.position.y = 4.5;
            tree.add(leaves);

            tree.position.set(x, 0, z);

            // scaling for variety
            const scale = 0.7 + Math.random() * 0.8;
            tree.scale.set(scale, scale, scale);

            scene.add(tree);

        // --- MAIN GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - lastTime) / 1000, 0.1);

            if (controls.isLocked) {
                // 1. Player Movement Physics (with Sprint)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speedMultiplier = isCrouching ? 0.5 : (isSprinting ? 2.2 : 1.0);
                if (moveForward || moveBackward) velocity.z -= direction.z * 50.0 * speedMultiplier * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 50.0 * speedMultiplier * delta;

                const playerRadius = 0.4;
                const playerBodyHeight = isCrouching ? 0.8 : 1.6;
                let playerBottom = camera.position.y - playerBodyHeight;
                let playerTop = camera.position.y + 0.2;

                const oldX = controls.getObject().position.x;
                controls.moveRight(-velocity.x * delta);

                // Platform Collision (X)
                for (let p of platformBoxes) {
                    if (controls.getObject().position.x + playerRadius > p.min.x && controls.getObject().position.x - playerRadius < p.max.x &&
                        controls.getObject().position.z + playerRadius > p.min.z && controls.getObject().position.z - playerRadius < p.max.z &&
                        playerBottom < p.max.y - 0.1 && playerTop > p.min.y) {
                        controls.getObject().position.x = oldX;
                        velocity.x = 0;
                        break;
                    }
                }
                // Zombie Collision (X)
                for (let t of targets) {
                    const dx = controls.getObject().position.x - t.position.x;
                    const dz = controls.getObject().position.z - t.position.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = t.userData.isBoss ? 1.8 : 0.8;
                    const zombieHeadHeight = t.position.y + 2.0;
                    if (dist < minDist && playerBottom < zombieHeadHeight) {
                        controls.getObject().position.x = oldX;
                        velocity.x = 0;
                        break;
                    }
                }

                const oldZ = controls.getObject().position.z;
                controls.moveForward(-velocity.z * delta);

                // Platform Collision (Z)
                for (let p of platformBoxes) {
                    if (controls.getObject().position.x + playerRadius > p.min.x && controls.getObject().position.x - playerRadius < p.max.x &&
                        controls.getObject().position.z + playerRadius > p.min.z && controls.getObject().position.z - playerRadius < p.max.z &&
                        playerBottom < p.max.y - 0.1 && playerTop > p.min.y) {
                        controls.getObject().position.z = oldZ;
                        velocity.z = 0;
                        break;
                    }
                }
                // Zombie Collision (Z)
                for (let t of targets) {
                    const dx = controls.getObject().position.x - t.position.x;
                    const dz = controls.getObject().position.z - t.position.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = t.userData.isBoss ? 1.8 : 0.8;
                    const zombieHeadHeight = t.position.y + 2.0;
                    if (dist < minDist && playerBottom < zombieHeadHeight) {
                        controls.getObject().position.z = oldZ;
                        velocity.z = 0;
                        break;
                    }
                }

                const playerPos = controls.getObject().position;

                // Jumping physics
                if (isJumping && canJump) {
                    velocityY = JUMP_FORCE;
                    canJump = false;
                }

                velocityY -= GRAVITY * delta; // Apply gravity
                camera.position.y += velocityY * delta;

                // Ground level depends on crouching AND platforms
                playerBottom = camera.position.y - playerBodyHeight;
                let currentGroundY = 0; // default floor level
                for (let p of platformBoxes) {
                    if (playerPos.x + playerRadius > p.min.x && playerPos.x - playerRadius < p.max.x &&
                        playerPos.z + playerRadius > p.min.z && playerPos.z - playerRadius < p.max.z) {
                        // Allow stepping up slightly or if landing
                        if (p.max.y > currentGroundY && playerBottom + 0.25 >= p.max.y) {
                            currentGroundY = p.max.y;
                        }
                    }
                }

                const targetGroundHeight = currentGroundY + playerBodyHeight;
                if (camera.position.y <= targetGroundHeight && velocityY <= 0) {
                    camera.position.y = targetGroundHeight;
                    velocityY = 0;
                    canJump = true;
                } else if (camera.position.y > targetGroundHeight + 0.1) {
                    // Walked off an edge
                    canJump = false;
                }

                const testVar = null;

                // Player Tree Collision
                for (let tree of treePositions) {
                    const dx = playerPos.x - tree.x;
                    const dz = playerPos.z - tree.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = 0.5 + tree.radius;
                    if (dist < minDist && dist > 0) {
                        const overlap = minDist - dist;
                        playerPos.x += (dx / dist) * overlap;
                        playerPos.z += (dz / dist) * overlap;
                    }
                }

                // Player Tree Collision
                for (let tree of treePositions) {
                    const dx = playerPos.x - tree.x;
                    const dz = playerPos.z - tree.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = 0.5 + tree.radius;
                    if (dist < minDist && dist > 0) {
                        const overlap = minDist - dist;
                        playerPos.x += (dx / dist) * overlap;
                        playerPos.z += (dz / dist) * overlap;
                    }
                }

                // Stealth Check
                let inBush = false;
                for (let b of bushPositions) {
                    if (Math.hypot(b.x - playerPos.x, b.z - playerPos.z) < b.radius) {
                        inBush = true; break;
                    }
                }
                const isHidden = isCrouching && inBush;

                // Medkit Pickup Check
                for (let i = medkits.length - 1; i >= 0; i--) {
                    const mk = medkits[i];
                    // Float and rotate animation
                    mk.position.y = 0.5 + Math.sin(time * 0.003 + i) * 0.15;
                    mk.rotation.y += 1.5 * delta;

                    const dist = Math.hypot(mk.position.x - playerPos.x, mk.position.z - playerPos.z);
                    if (dist < 1.5) {
                        health = Math.min(100, health + mk.userData.healAmount);
                        document.getElementById('healthValue').innerText = Math.floor(health);
                        playPickupSound();
                        scene.remove(mk);
                        medkits.splice(i, 1);
                        // Respawn a new one elsewhere
                        createMedkit();
                    }
                }

                // Cigarette Pickup Check
                for (let i = cigarettes.length - 1; i >= 0; i--) {
                    const cig = cigarettes[i];
                    cig.rotation.y += 2 * delta;
                    cig.position.y = 0.2 + Math.sin(time * 0.005 + i) * 0.1;

                    const dist = Math.hypot(cig.position.x - playerPos.x, cig.position.z - playerPos.z);
                    if (dist < 1.2) {
                        doubleDamageTimer = 5;
                        damageMultiplier = 2;
                        powerupUI.style.display = 'flex';
                        playPickupSound();

                        scene.remove(cig);
                        cigarettes.splice(i, 1);
                        createCigarette();
                    }
                }

                // 2. Bullet Physics & Collision Detection
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.position.addScaledVector(b.userData.velocity, delta);
                    b.userData.life--;

                    let hit = false;

                    // Check collisions
                    for (let j = targets.length - 1; j >= 0; j--) {
                        const t = targets[j];

                        // Fast mathematical cylinder collision (Ignores the high-altitude map icons)
                        const dx = b.position.x - t.position.x;
                        const dz = b.position.z - t.position.z;
                        const dy = b.position.y - t.position.y;
                        const dist2D = Math.hypot(dx, dz);

                        // Humanoid Hitbox (Dynamic scale for boss)
                        const radiusThreshold = t.userData.isBoss ? 1.5 : 0.5;
                        const heightThreshold = t.userData.isBoss ? 6.6 : 2.2;

                        if (dist2D < radiusThreshold && dy >= 0 && dy <= heightThreshold) {
                            // Boss invincibility window (3 seconds)
                            if (t.userData.isBoss && performance.now() - t.userData.spawnTime < 3000) break;

                            hit = true;
                            t.userData.hp -= damageMultiplier;
                            playHitSound();

                            // Update Boss Bar
                            if (t.userData.isBoss) {
                                const healthPct = (t.userData.hp / BOSS_MAX_HP) * 100;
                                bossBarFill.style.width = Math.max(0, healthPct) + '%';
                            }

                            // Flash when hit
                            if (t.userData.isBoss) {
                                t.userData.materials.forEach(m => m.color.setHex(0xff0000)); // Flash red
                                setTimeout(() => {
                                    if (t && t.userData.materials) {
                                        t.userData.materials.forEach(m => m.color.setHex(0xffffff)); // Restore white tint (shows texture)
                                    }
                                }, 100);
                            } else {
                                t.userData.materialRef.color.setHex(0xffffff); // Flash white
                                setTimeout(() => {
                                    if (t && t.userData.materialRef) {
                                        t.userData.materialRef.color.setHex(t.userData.originalColor);
                                    }
                                }, 100);
                            }

                            if (t.userData.hp <= 0) {
                                handleEnemyDeath(t, j);
                            }
                            break;
                        }
                    }

                    if (hit || b.userData.life <= 0) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                }

                // 3. Target Chasing Logic & Player Damage

                targets.forEach(t => {
                    if (isHidden) return; // Zombies lose interest and stop moving

                    // Calculate direction from target to player
                    const directionToPlayer = new THREE.Vector3().subVectors(playerPos, t.position);
                    directionToPlayer.y = 0; // Ignore height difference so they don't float/sink

                    // Only move if they aren't right on top of the player
                    const currentDist = directionToPlayer.length();
                    const minAllowedDist = t.userData.isBoss ? 1.8 : 0.8;
                    if (currentDist > minAllowedDist) {
                        directionToPlayer.normalize();

                        // --- DIFFICULTY SCALING ---
                        // Enemies get faster as your score increases (Base speed + score / 350)
                        const difficultyBoost = score / 350;
                        const scaledSpeed = t.userData.speed + difficultyBoost;

                        // Move target with scaled speed
                        t.position.addScaledVector(directionToPlayer, scaledSpeed * delta);

                        // Zombie-Zombie Collision Check (Soft push)
                        for (let other of targets) {
                            if (other !== t) {
                                const dx = t.position.x - other.position.x;
                                const dz = t.position.z - other.position.z;
                                const dist = Math.hypot(dx, dz);
                                const minDist = 0.8; // Approximate zombie collision radius
                                if (dist < minDist && dist > 0) {
                                    const overlap = minDist - dist;
                                    // Push apart (each handles half the overlap so they repel smoothly)
                                    t.position.x += (dx / dist) * overlap * 0.5;
                                    t.position.z += (dz / dist) * overlap * 0.5;
                                }
                            }
                        }

                        // Zombie Tree Collision Check (Hard boundary)
                        for (let tree of treePositions) {
                            const dx = t.position.x - tree.x;
                            const dz = t.position.z - tree.z;
                            const dist = Math.hypot(dx, dz);
                            const minDist = 0.4 + tree.radius;
                            if (dist < minDist && dist > 0) {
                                const overlap = minDist - dist;
                                t.position.x += (dx / dist) * overlap;
                                t.position.z += (dz / dist) * overlap;
                            }
                        }

                        // Zombie Mountain Collision Check (Hard boundary)
                        for (let p of platformBoxes) {
                            if (t.position.x + 0.4 > p.min.x && t.position.x - 0.4 < p.max.x &&
                                t.position.z + 0.4 > p.min.z && t.position.z - 0.4 < p.max.z) {
                                // If zombie is below the top of the platform (wall hit)
                                if (t.position.y < p.max.y - 0.1) {
                                    // Calculate depths of penetration on all 4 sides
                                    const overlapLeft = (t.position.x + 0.4) - p.min.x;
                                    const overlapRight = p.max.x - (t.position.x - 0.4);
                                    const overlapFront = (t.position.z + 0.4) - p.min.z;
                                    const overlapBack = p.max.z - (t.position.z - 0.4);

                                    // Find which side is the shallowest to push them out of
                                    const minOverlap = Math.min(overlapLeft, overlapRight, overlapFront, overlapBack);

                                    // Snap position out instantly
                                    if (minOverlap === overlapLeft) t.position.x -= overlapLeft;
                                    else if (minOverlap === overlapRight) t.position.x += overlapRight;
                                    else if (minOverlap === overlapFront) t.position.z -= overlapFront;
                                    else if (minOverlap === overlapBack) t.position.z += overlapBack;
                                }
                            }
                        }


                        // Make target face player before calculating animation
                        t.lookAt(playerPos.x, t.position.y, playerPos.z);

                        // --- WALKING ANIMATION (Bobbing & Arm Swinging) ---
                        const walkSpeed = t.userData.isBoss ? 4 : 8; // Boss bobs slower/heavy
                        const bobAmount = t.userData.isBoss ? 0.3 : 0.1;
                        const walkCycle = Math.sin(time * 0.001 * walkSpeed);

                        // Vertical bobbing (use absolute to stay above ground)
                        const bobOffset = Math.abs(walkCycle) * bobAmount;

                        // Arm swinging (Arms are meshes at children index 2 and 3)
                        if (t.children[2]) t.children[2].rotation.x = walkCycle * 0.5;
                        if (t.children[3]) t.children[3].rotation.x = -walkCycle * 0.5;

                        // Zombie Vertical Height (Terrain Tracking + Bobbing)
                        let tGroundY = 0;
                        for (let p of platformBoxes) {
                            if (t.position.x + 0.4 > p.min.x && t.position.x - 0.4 < p.max.x &&
                                t.position.z + 0.4 > p.min.z && t.position.z - 0.4 < p.max.z) {
                                if (p.max.y > tGroundY && t.position.y + 0.5 >= p.max.y) {
                                    tGroundY = p.max.y;
                                }
                            }
                        }

                        // Apply smoothing target height with the bob offset
                        const targetY = tGroundY + bobOffset;
                        t.position.y += (targetY - t.position.y) * 10 * delta;
                    }

                    // Check if target is close enough to damage player
                    const dist2D = Math.hypot(t.position.x - playerPos.x, t.position.z - playerPos.z);
                    if (dist2D < 1.5) {
                        if (!godMode) {
                            // Check for cooldown (1 second between hits)
                            if (!t.userData.lastHitTime) t.userData.lastHitTime = 0;
                            if (time - t.userData.lastHitTime > 1000) {
                                const damage = 15 + Math.random() * 5;
                                health -= damage;
                                t.userData.lastHitTime = time;
                                playHitSound(); // Optional: play hit sound when damaged
                                document.getElementById('healthValue').innerText = Math.max(0, Math.floor(health));
                            }

                            // Game Over State
                            if (health <= 0) {
                                controls.unlock();
                                setTimeout(() => {
                                    alert(`You survived until scoring: ${score}`);
                                    health = 100;
                                    score = 0;
                                    document.getElementById('healthValue').innerText = health;
                                    document.getElementById('scoreValue').innerText = score;

                                    // Reset player position
                                    controls.getObject().position.set(0, 1.6, 0);

                                    // Push enemies back
                                    targets.forEach(enemy => {
                                        const angle = Math.random() * Math.PI * 2;
                                        const radius = 30 + Math.random() * 20;
                                        enemy.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                                    });
                                }, 10);
                            }
                        }
                    }
                });
            }

            // 1. Render Main Scene
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissorTest(false);
            renderer.clear();
            renderer.render(scene, camera);

            // 2. Render Minimap (Dedicated Canvas)
            const playerPosForMap = controls.getObject().position;
            playerDot.position.x = playerPosForMap.x;
            playerDot.position.z = playerPosForMap.z;
            playerDot.position.y = 150;
            const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
            playerDot.rotation.y = euler.y;
            
            if (isMobile) {
                playerDot.scale.setScalar(0.6); 
            } else {
                playerDot.scale.setScalar(1.0);
            }

            mapCamera.position.x = playerPosForMap.x;
            mapCamera.position.z = playerPosForMap.z;

            // Render to secondary canvas
            const oldFog = scene.fog;
            scene.fog = null; // Disable fog for minimap view
            minimapRenderer.render(scene, mapCamera);
            scene.fog = oldFog;

            // --- RELOAD ANIMATION ---
            let reloadYOffset = 0;
            let reloadRotX = 0;
            if (isReloading) {
                reloadProgress += delta / 1.5; // 1.5s reload
                if (reloadProgress >= 1.0) {
                    isReloading = false;
                    ammo = maxAmmo;
                    ammoValueEl.innerText = ammo;
                    reloadProgress = 0;
                }

                // Cinematic dip animation (parabolic)
                const dip = Math.sin(reloadProgress * Math.PI);
                reloadYOffset = -dip * 0.4;
                reloadRotX = -dip * Math.PI / 4;
            }

            // --- RECOIL ANIMATION ---
            recoilAmount = THREE.MathUtils.lerp(recoilAmount, 0, 10 * delta);
            recoilRotation = THREE.MathUtils.lerp(recoilRotation, 0, 10 * delta);

            // Power-up Cooldown
            if (doubleDamageTimer > 0) {
                doubleDamageTimer -= delta;
                doubleDamageStatus.innerText = `🚬 x2 DAMAGE: ${doubleDamageTimer.toFixed(1)}s`;
                if (doubleDamageTimer <= 0) {
                    doubleDamageTimer = 0;
                    damageMultiplier = 1;
                    powerupUI.style.display = 'none';
                }
            }

            // Apply recoil & reload to gunGroup
            if (typeof gunGroup !== 'undefined') {
                gunGroup.position.set(0.3, -0.3 + recoilAmount * 0.5 + reloadYOffset, -0.5 + recoilAmount);
                gunGroup.rotation.x = -recoilRotation + reloadRotX;
            }

            // Nuke cooldown timer
            if (!nukeReady && !nukeActive) {
                nukeCooldown -= delta;
                if (nukeCooldown <= 0) {
                    nukeReady = true;
                }
                updateNukeUI();
            }

            // Nuke expansion animation
            if (nukeActive && nukeSphere) {
                nukeTimer += delta;
                const maxRadius = 120;
                const expandSpeed = 60;
                const currentRadius = nukeTimer * expandSpeed;
                nukeSphere.scale.setScalar(currentRadius);
                nukeSphere.material.opacity = Math.max(0, 0.8 - (currentRadius / maxRadius) * 0.8);

                // Camera shake
                const shakeIntensity = Math.max(0, 0.15 - nukeTimer * 0.05);
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.z += (Math.random() - 0.5) * shakeIntensity;

                // Kill all enemies caught in the blast radius
                for (let j = targets.length - 1; j >= 0; j--) {
                    const t = targets[j];
                    const dist = Math.hypot(t.position.x - nukeSphere.position.x, t.position.z - nukeSphere.position.z);
                    if (dist < currentRadius) {
                        // Boss invincibility window (3 seconds)
                        if (t.userData.isBoss && performance.now() - t.userData.spawnTime < 3000) continue;
                        handleEnemyDeath(t, j);
                    }
                }

                // End nuke after it reaches max radius
                if (currentRadius >= maxRadius) {
                    scene.remove(nukeSphere);
                    nukeSphere = null;
                    nukeActive = false;
                    updateNukeUI();
                    // Respawn fresh enemies
                    for (let i = 0; i < 15; i++) createHumanTarget();
                }
            }

            lastTime = time;
        }

        // TOUCH EVENTS
        if (isMobile) {
            window.addEventListener('touchstart', (e) => {
                if (!controls.isLocked) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    // Left half move
                    if (t.clientX < window.innerWidth / 2) {
                        if (touchMoveId === null) {
                            touchMoveId = t.identifier;
                            joystickStart = { x: t.clientX, y: t.clientY };
                        }
                    } else {
                        // Right half look
                        if (touchLookId === null) {
                            touchLookId = t.identifier;
                            lastTouchLook.x = t.clientX;
                            lastTouchLook.y = t.clientY;
                        }
                    }
                }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!controls.isLocked) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === touchMoveId) {
                        const dx = t.clientX - joystickStart.x;
                        const dy = t.clientY - joystickStart.y;
                        const dist = Math.min(60, Math.hypot(dx, dy));
                        const angle = Math.atan2(dy, dx);

                        joystickVector.x = (Math.cos(angle) * dist) / 60;
                        joystickVector.y = (Math.sin(angle) * dist) / 60;

                        joystickStick.style.transform = `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist}px))`;

                        moveForward = joystickVector.y < -0.3;
                        moveBackward = joystickVector.y > 0.3;
                        moveLeft = joystickVector.x < -0.3;
                        moveRight = joystickVector.x > 0.3;
                    } else if (t.identifier === touchLookId) {
                        // Look logic - manually rotate camera
                        const movementX = t.clientX - lastTouchLook.x;
                        const movementY = t.clientY - lastTouchLook.y;

                        // Fix: Aiming sensitivity and inversion
                        // movementY is positive when dragging DOWN, so we SUBTRACT it to look UP in FPS math
                        // BUT PointerLock style usually expects subtraction. Let's ensure it's not double-inverted.
                        camera.rotation.y -= movementX * 0.005;
                        camera.rotation.x -= movementY * 0.005; // Standard FPS: Drag down = look up? Let's check.
                        // Actually, many mobile games use Pull Down = Look Down (Direct mapping).
                        // If user said "turns towards ground", it might be too sensitive or inverted.
                        // Let's use a smaller multiplier and standard mapping.

                        camera.rotation.x = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, camera.rotation.x));

                        lastTouchLook.x = t.clientX;
                        lastTouchLook.y = t.clientY;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === touchMoveId) {
                        touchMoveId = null;
                        joystickVector = { x: 0, y: 0 };
                        joystickStick.style.transform = 'translate(-50%, -50%)';
                        moveForward = moveBackward = moveLeft = moveRight = false;
                    } else if (t.identifier === touchLookId) {
                        touchLookId = null;
                    }
                }
            });

            // Mobile Buttons
            document.getElementById('btnShoot').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
            document.getElementById('btnJump').addEventListener('touchstart', (e) => { e.preventDefault(); isJumping = true; });
            document.getElementById('btnJump').addEventListener('touchend', (e) => { e.preventDefault(); isJumping = false; });
            document.getElementById('btnReload').addEventListener('touchstart', (e) => { e.preventDefault(); startReload(); });
            document.getElementById('btnNuke').addEventListener('touchstart', (e) => { e.preventDefault(); triggerNuke(); });
        }

        animate();
    </script>
</body>

</html>
